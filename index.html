<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive AR Business Card – Andronikus Pardamean Sihotang | Mahasiswa D4 TRPL"
    />
    <title>AR Business Card – Andronikus Pardamean Sihotang</title>

    <!-- Favicon (inline — cegah 404) -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎴</text></svg>"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <!-- A-Frame & AR.js (wajib di <head>) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body>

    <!-- ══════════════════════════════════════════════════
         ① HEADER OVERLAY
    ══════════════════════════════════════════════════ -->
    <header id="header-overlay" role="banner">
      <div class="header-brand">
        <span class="label">AR Business Card</span>
        <h1>Andronikus Sihotang</h1>
      </div>
      <div class="live-badge" aria-label="Camera live">
        <span class="live-dot"></span>
        LIVE CAM
      </div>
    </header>

    <!-- ══════════════════════════════════════════════════
         ② SOCIAL MEDIA BUTTONS
         ▸ Ganti href dengan akun Anda sebelum presentasi
    ══════════════════════════════════════════════════ -->
    <nav id="social-overlay" aria-label="Social media links">
      <a id="btn-linkedin" href="https://linkedin.com/in/andronikus-sihotang"
         target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        <span>LinkedIn</span>
      </a>
      <a id="btn-github" href="https://github.com/andronikus-sihotang"
         target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        <span>GitHub</span>
      </a>
      <a id="btn-instagram" href="https://instagram.com/andronikus"
         target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
        </svg>
        <span>Instagram</span>
      </a>
      <a id="btn-portfolio" href="https://andronikus-portfolio.vercel.app"
         target="_blank" rel="noopener noreferrer" class="social-btn" aria-label="Portfolio">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93s3.06-7.44 7-7.93v15.86zm2 0V4.07c3.94.49 7 3.85 7 7.93s-3.06 7.44-7 7.93z"/>
        </svg>
        <span>Portfolio</span>
      </a>
    </nav>

    <!-- ══════════════════════════════════════════════════
         ③ SCAN GUIDE (tengah layar, hilang saat marker ditemukan)
    ══════════════════════════════════════════════════ -->
    <div id="marker-status" aria-live="polite" aria-label="Scan status">
      <div class="scan-frame" aria-hidden="true">
        <span></span>
        <div class="scan-line"></div>
      </div>
      <p class="scan-label">Arahkan kamera ke marker</p>
    </div>

    <!-- Info profil dihapus dari HTML overlay.
         Semua info (nama, jabatan, kemampuan, kontak) tampil
         di dalam AR scene saat marker terdeteksi. -->

    <!-- ══════════════════════════════════════════════════
         ⑤ A-FRAME AR SCENE
         alpha:true  → canvas WebGL transparan agar video kamera terlihat
    ══════════════════════════════════════════════════ -->
    <a-scene
      id="ar-scene"
      embedded
      arjs="sourceType: webcam;
            debugUIEnabled: false;
            detectionMode: mono_and_matrix;
            matrixCodeType: 3x3;"
      renderer="logarithmicDepthBuffer: true;
                antialias: true;
                alpha: true;"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
    >

      <!-- ── PRELOAD ASET ── -->
      <a-assets timeout="30000">
        <!--
          MODEL 3D: assets/models/card_model.glb
          Sumber gratis: https://sketchfab.com (filter: Animated + Free + GLB)
        -->
        <a-asset-item
          id="card-3d-model"
          src="assets/models/card_model.glb"
          response-type="arraybuffer"
          crossorigin="anonymous"
        ></a-asset-item>

        <!-- Foto profil (tekstur AR) -->
        <img
          id="profile-tex"
          src="assets/images/profile.jpg"
          crossorigin="anonymous"
          alt=""
          onerror="this.src='assets/images/profile_placeholder.png'; this.onerror=null;"
        />
      </a-assets>

      <!-- Kamera (dikelola AR.js) -->
      <a-entity camera></a-entity>

      <!-- ══════════════════════════════════════════════
           CUSTOM MARKER
           ─────────────────────────────────────────
           Setup marker custom:
           1. Generator: https://jeromeetienne.github.io/AR.js/three.js/
                         examples/marker-training/examples/generator.html
           2. Download .patt → simpan di assets/markers/marker.patt
           ─────────────────────────────────────────
           Testing cepat → ganti ke: <a-marker preset="hiro">
      ══════════════════════════════════════════════ -->
      <a-marker
        id="ar-marker"
        type="pattern"
        url="assets/markers/marker.patt"
        emitevents="true"
        smooth="true"
        smoothCount="10"
        smoothTolerance="0.01"
        smoothThreshold="5"
      >

      <!-- CARD PROFIL -->
<a-entity
    id="profile-card"
    position="-1.1 0.8 0"
    scale="0.8 0.8 0.8"
    visible="false">

    <!-- Background -->
    <a-plane
        width="1.3"
        height="1.8"
        color="#0a0a14"
        opacity="0.92">
    </a-plane>

    <!-- Border Glow -->
    <a-plane
        width="1.33"
        height="1.83"
        color="#7c3aed"
        opacity="0.12"
        position="0 0 -0.01">
    </a-plane>

    <!-- Foto -->
    <a-circle
        src="#profile-tex"
        radius="0.25"
        position="0 0.55 0.01">
    </a-circle>

    <!-- Nama -->
    <a-text
        value="ANDRONIKUS SIHOTANG"
        align="center"
        color="#ffffff"
        width="1.7"
        position="0 0.15 0.01">
    </a-text>

    <!-- Prodi -->
    <a-text
        value="D4 TRPL"
        align="center"
        color="#06b6d4"
        width="1.4"
        position="0 -0.05 0.01">
    </a-text>

    <!-- Kampus -->
    <a-text
        value="Politeknik WBI"
        align="center"
        color="#a78bfa"
        width="1.2"
        position="0 -0.18 0.01">
    </a-text>

    <!-- Bio -->
    <a-text
        value="Mahasiswa Teknik Rekayasa Perangkat Lunak yang fokus pada pengembangan Web, Mobile Flutter, dan Augmented Reality."
        align="center"
        color="#d6d9ff"
        width="1.1"
        wrap-count="20"
        position="0 -0.55 0.01">
    </a-text>

</a-entity>


<!-- MODEL BERUANG -->
<a-entity
    id="floating-model"
    gltf-model="#card-3d-model"
    position="0.9 0.55 0"
    scale="0.18 0.18 0.18"
    rotation="0 0 0"
    visible="false"

    animation__float="
    property: position;
    from: 0.9 0.50 0;
    to: 0.9 0.70 0;
    dur: 2200;
    dir: alternate;
    loop: true;
    easing: easeInOutSine;"

    animation__rotate="
    property: rotation;
    from: 0 0 0;
    to: 0 360 0;
    dur: 12000;
    loop: true;
    easing: linear;">
</a-entity>
      
      </a-marker>
    </a-scene>

    <!-- JavaScript (dipisah) -->
    <script src="assets/js/app.js"></script>

  </body>
</html>
